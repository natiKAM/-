<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב שעות עבודה | Brandy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <style>
    /* ── Base ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #191917;
      font-family: 'Heebo', Arial, sans-serif;
      color: #f5f5f5;
      min-height: 100vh;
    }

    /* ── Navbar ───────────────────────────────────────────────────────────── */
    .brandy-nav {
      background: #191917;
      border-bottom: 1px solid #333023;
      padding: .75rem 0;
      position: sticky;
      top: 0;
      z-index: 1030;
    }
    .brandy-logo {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
      text-decoration: none;
    }
    .brandy-logo .logo-main {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: .5px;
      color: #f5f5f5;
    }
    .brandy-logo .logo-main .bracket {
      color: #ceff00;
    }
    .brandy-logo .logo-sub {
      font-size: .65rem;
      font-weight: 400;
      color: #878686;
      letter-spacing: 1.5px;
      text-transform: lowercase;
    }
    .nav-user-chip {
      background: #333023;
      border: 1px solid #4a4535;
      color: #d1ccbc;
      border-radius: 20px;
      padding: .25rem .8rem;
      font-size: .82rem;
      font-weight: 600;
    }
    .btn-nav-action {
      background: transparent;
      border: 1px solid #4a4535;
      color: #878686;
      border-radius: 8px;
      padding: .3rem .75rem;
      font-size: .82rem;
      font-weight: 500;
      transition: all .2s;
    }
    .btn-nav-action:hover {
      border-color: #ceff00;
      color: #ceff00;
    }
    .btn-nav-accent {
      background: transparent;
      border: 1px solid #ceff00;
      color: #ceff00;
      border-radius: 8px;
      padding: .3rem .75rem;
      font-size: .82rem;
      font-weight: 600;
      transition: all .2s;
    }
    .btn-nav-accent:hover {
      background: #ceff00;
      color: #191917;
    }

    /* ── Cards ────────────────────────────────────────────────────────────── */
    .card {
      background: #333023;
      border: 1px solid #4a4535;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.35);
    }
    .card-header {
      background: #2a2620 !important;
      border-bottom: 1px solid #4a4535;
      border-radius: 16px 16px 0 0 !important;
    }

    /* ── Login ────────────────────────────────────────────────────────────── */
    #login-card {
      max-width: 440px;
      margin: 72px auto;
      border: 1px solid #4a4535;
    }
    .login-icon-wrap {
      width: 64px;
      height: 64px;
      background: #ceff00;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }
    .login-icon-wrap i { font-size: 1.8rem; color: #191917; }

    /* ── Form controls ────────────────────────────────────────────────────── */
    .form-label { color: #d1ccbc; font-weight: 600; font-size: .88rem; margin-bottom: .4rem; }
    .form-control, .form-select {
      background: #191917 !important;
      border: 1px solid #878686;
      color: #f5f5f5 !important;
      border-radius: 10px;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control::placeholder { color: #595855; }
    .form-control:focus, .form-select:focus {
      border-color: #ceff00 !important;
      box-shadow: 0 0 0 3px rgba(206,255,0,.15) !important;
      outline: none;
      background: #191917 !important;
      color: #f5f5f5 !important;
    }
    .form-select option { background: #191917; color: #f5f5f5; }
    .pin-input {
      letter-spacing: .5em;
      font-size: 1.4rem;
      text-align: center;
      font-weight: 700;
    }

    /* ── Buttons ──────────────────────────────────────────────────────────── */
    .btn-primary {
      background: #ceff00 !important;
      border-color: #ceff00 !important;
      color: #191917 !important;
      font-weight: 700;
      border-radius: 10px;
      transition: all .2s;
    }
    .btn-primary:hover, .btn-primary:focus {
      background: #d8ff33 !important;
      border-color: #d8ff33 !important;
      color: #191917 !important;
      box-shadow: 0 4px 16px rgba(206,255,0,.35) !important;
    }
    .btn-xl { padding: .75rem 2rem; font-size: 1.05rem; font-weight: 700; }
    .btn-success {
      background: #ceff00 !important;
      border-color: #ceff00 !important;
      color: #191917 !important;
      font-weight: 700;
      border-radius: 10px;
      transition: all .2s;
    }
    .btn-success:hover, .btn-success:focus {
      background: #d8ff33 !important;
      border-color: #d8ff33 !important;
      box-shadow: 0 4px 16px rgba(206,255,0,.3) !important;
    }
    .btn-danger {
      background: #3d1a1a !important;
      border-color: #7a2020 !important;
      color: #ff6b6b !important;
      font-weight: 700;
      border-radius: 10px;
      transition: all .2s;
    }
    .btn-danger:hover {
      background: #5c2020 !important;
      border-color: #ff6b6b !important;
      box-shadow: 0 4px 12px rgba(255,107,107,.2) !important;
    }
    .btn-outline-primary {
      border-color: #ceff00 !important;
      color: #ceff00 !important;
      background: transparent !important;
      border-radius: 8px;
      font-weight: 600;
      transition: all .2s;
    }
    .btn-outline-primary:hover {
      background: #ceff00 !important;
      color: #191917 !important;
    }

    /* ── Tabs ─────────────────────────────────────────────────────────────── */
    .nav-tabs {
      border-bottom: 1px solid #4a4535;
      gap: .25rem;
    }
    .nav-tabs .nav-link {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #878686;
      font-weight: 600;
      padding: .65rem 1.1rem;
      border-radius: 0;
      transition: all .2s;
      font-size: .9rem;
    }
    .nav-tabs .nav-link:hover { color: #d1ccbc; border-bottom-color: #4a4535; }
    .nav-tabs .nav-link.active {
      color: #ceff00 !important;
      border-bottom-color: #ceff00 !important;
      background: transparent !important;
    }
    .tab-content { padding-top: 1.5rem; }

    /* ── Timer display ────────────────────────────────────────────────────── */
    #timer-display {
      font-size: 3.8rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 4px;
      color: #ceff00;
      font-family: 'Heebo', monospace;
      text-shadow: 0 0 30px rgba(206,255,0,.3);
    }
    #timer-display.running {
      color: #ceff00;
      animation: timerPulse 2s ease-in-out infinite;
    }
    @keyframes timerPulse {
      0%, 100% { opacity: 1; text-shadow: 0 0 30px rgba(206,255,0,.3); }
      50% { opacity: .75; text-shadow: 0 0 50px rgba(206,255,0,.6); }
    }
    .timer-status-text { color: #878686; font-size: .85rem; letter-spacing: .5px; }

    /* ── Timer running info ───────────────────────────────────────────────── */
    .timer-running-info-box {
      background: rgba(206,255,0,.08);
      border: 1px solid rgba(206,255,0,.25);
      border-radius: 12px;
      padding: .9rem 1.2rem;
      color: #ceff00;
    }
    .timer-running-info-box .client-name { font-weight: 700; color: #ceff00; }
    .timer-running-info-box .desc-text { color: #878686; font-size: .85rem; }

    /* ── Alerts ───────────────────────────────────────────────────────────── */
    .alert-success {
      background: #1a2e10 !important;
      border-color: #2d5018 !important;
      color: #ceff00 !important;
      border-radius: 10px;
    }
    .alert-danger {
      background: #2e1010 !important;
      border-color: #5c1e1e !important;
      color: #ff8080 !important;
      border-radius: 10px;
    }
    .alert-warning {
      background: #2e2510 !important;
      border-color: #5c4a1e !important;
      color: #ffd580 !important;
      border-radius: 10px;
    }

    /* ── Tables ───────────────────────────────────────────────────────────── */
    .table {
      color: #d1ccbc;
      --bs-table-bg: transparent;
      --bs-table-hover-bg: rgba(206,255,0,.04);
      --bs-table-border-color: #3d3929;
    }
    .table thead th {
      background: #ceff00 !important;
      color: #191917 !important;
      font-weight: 700;
      font-size: .82rem;
      letter-spacing: .3px;
      border-color: #ceff00 !important;
      padding: .75rem 1rem;
    }
    .table tbody td {
      border-color: #3d3929;
      padding: .75rem 1rem;
      vertical-align: middle;
    }
    .recent-log-row:hover { background: rgba(206,255,0,.04) !important; }

    /* ── Badges ───────────────────────────────────────────────────────────── */
    .badge.bg-primary, .log-badge {
      background: #ceff00 !important;
      color: #191917 !important;
      font-weight: 700;
      border-radius: 6px;
    }
    .log-badge { font-size: .75rem; padding: .35em .65em; }

    /* ── Divider ──────────────────────────────────────────────────────────── */
    .section-divider {
      border-color: #4a4535;
      margin: 1.5rem 0;
    }

    /* ── Dashboard greeting ───────────────────────────────────────────────── */
    .dash-greeting {
      color: #878686;
      font-size: .95rem;
    }
    .dash-greeting .emp-name {
      color: #ceff00;
      font-weight: 700;
    }
    .dash-date { color: #595855; font-size: .82rem; }

    /* ── Manual duration preview ──────────────────────────────────────────── */
    #manual-duration-preview {
      font-weight: 600;
      font-size: .88rem;
    }

    /* ── History card header ──────────────────────────────────────────────── */
    .history-header-title { color: #d1ccbc; font-weight: 700; }
    .history-header-title i { color: #ceff00; }

    /* ── Section card title ───────────────────────────────────────────────── */
    .section-title {
      color: #d1ccbc;
      font-weight: 700;
      font-size: .95rem;
    }
    .section-title i { color: #ceff00; }

    /* ── Scrollbar ────────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #191917; }
    ::-webkit-scrollbar-thumb { background: #4a4535; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #ceff00; }
  </style>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────────────────── -->
<nav class="brandy-nav">
  <div class="container-fluid px-3">
    <div class="d-flex align-items-center justify-content-between">
      <a href="/" class="brandy-logo">
        <span class="logo-main"><span class="bracket">[</span>Brandy<span class="bracket">]</span></span>
        <span class="logo-sub">own your story</span>
      </a>
      <div class="d-flex align-items-center gap-2">
        <span class="nav-user-chip d-none" id="nav-name"></span>
        <a href="/admin" class="btn-nav-accent d-none" id="nav-admin-link">
          <i class="bi bi-gear me-1"></i>ניהול
        </a>
        <button class="btn-nav-action d-none" id="btn-logout" onclick="logout()">
          <i class="bi bi-box-arrow-right me-1"></i>יציאה
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- ── LOGIN SECTION ──────────────────────────────────────────────────────── -->
<div id="section-login" class="container">
  <div id="login-card" class="card p-4 p-sm-5">
    <div class="text-center mb-4">
      <div class="login-icon-wrap">
        <i class="bi bi-person-fill"></i>
      </div>
      <h4 class="fw-800 mb-1" style="font-weight:800;color:#f5f5f5;">כניסה למערכת</h4>
      <p class="mb-0" style="color:#878686;font-size:.85rem;">מעקב שעות עבודה</p>
    </div>
    <div id="login-error" class="alert alert-danger d-none"></div>
    <div class="mb-3">
      <label class="form-label">שם עובד</label>
      <select id="sel-employee" class="form-select form-select-lg">
        <option value="">-- בחר עובד --</option>
      </select>
    </div>
    <div class="mb-4">
      <label class="form-label">קוד PIN (4 ספרות)</label>
      <input type="password" id="inp-pin" class="form-control form-control-lg pin-input"
             maxlength="4" inputmode="numeric" placeholder="••••" />
    </div>
    <button class="btn btn-primary btn-xl w-100" onclick="doLogin()">
      <i class="bi bi-box-arrow-in-right me-1"></i> כניסה
    </button>
    <div class="text-center mt-3">
      <a href="/admin" style="color:#878686;font-size:.82rem;text-decoration:none;">כניסת מנהל</a>
    </div>
  </div>
</div>

<!-- ── MAIN DASHBOARD ─────────────────────────────────────────────────────── -->
<div id="section-dashboard" class="container py-4 d-none">

  <!-- Greeting row -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="dash-greeting">
      <i class="bi bi-person-check-fill me-1" style="color:#ceff00;"></i>
      שלום, <span id="dash-name" class="emp-name"></span>
    </div>
    <small class="dash-date" id="dash-date"></small>
  </div>

  <!-- Tabs -->
  <ul class="nav nav-tabs" id="mainTab">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-timer">
        <i class="bi bi-stopwatch me-1"></i> טיימר
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-manual">
        <i class="bi bi-pencil-square me-1"></i> דיווח ידני
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-history" onclick="loadMyLogs()">
        <i class="bi bi-list-ul me-1"></i> היסטוריה
      </button>
    </li>
  </ul>

  <div class="tab-content">

    <!-- TAB: TIMER ─────────────────────────────────────────────────────────── -->
    <div class="tab-pane fade show active" id="tab-timer">
      <div class="card p-4 mb-3">
        <!-- Clock display -->
        <div class="text-center mb-4">
          <div id="timer-display">00:00:00</div>
          <small id="timer-status-text" class="timer-status-text">לא פעיל</small>
        </div>

        <!-- Running info -->
        <div id="timer-running-info" class="timer-running-info-box d-none mb-4 text-center">
          <div class="mb-1">
            <i class="bi bi-play-circle-fill me-1"></i>
            מדידה פעילה: <span class="client-name" id="timer-client-name"></span>
          </div>
          <div class="desc-text" id="timer-desc-text"></div>
        </div>

        <!-- Form -->
        <div id="timer-form">
          <div class="mb-3">
            <label class="form-label">לקוח <span style="color:#ff6b6b;">*</span></label>
            <select id="timer-client" class="form-select form-select-lg">
              <option value="">-- בחר לקוח --</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label">תיאור המשימה</label>
            <input type="text" id="timer-desc" class="form-control form-control-lg"
                   placeholder="למשל: פגישת ייעוץ, כתיבת הצעת מחיר..." />
          </div>
        </div>

        <!-- Action buttons -->
        <div class="d-grid gap-2">
          <button id="btn-start" class="btn btn-success btn-xl" onclick="startTimer()">
            <i class="bi bi-play-fill me-1"></i> התחל מדידה
          </button>
          <button id="btn-stop" class="btn btn-danger btn-xl d-none" onclick="stopTimer()">
            <i class="bi bi-stop-fill me-1"></i> סיים מדידה
          </button>
        </div>

        <div id="timer-alert" class="mt-3 d-none"></div>
      </div>
    </div>

    <!-- TAB: MANUAL ────────────────────────────────────────────────────────── -->
    <div class="tab-pane fade" id="tab-manual">
      <div class="card p-4">
        <h6 class="section-title mb-4">
          <i class="bi bi-calendar-plus me-1"></i>דיווח שעות ידני
        </h6>
        <div id="manual-alert" class="d-none mb-3"></div>
        <div class="row g-3">
          <div class="col-12">
            <label class="form-label">לקוח <span style="color:#ff6b6b;">*</span></label>
            <select id="manual-client" class="form-select">
              <option value="">-- בחר לקוח --</option>
            </select>
          </div>
          <div class="col-12 col-sm-4">
            <label class="form-label">תאריך <span style="color:#ff6b6b;">*</span></label>
            <input type="date" id="manual-date" class="form-control" />
          </div>
          <div class="col-6 col-sm-4">
            <label class="form-label">שעת התחלה <span style="color:#ff6b6b;">*</span></label>
            <input type="time" id="manual-start" class="form-control" />
          </div>
          <div class="col-6 col-sm-4">
            <label class="form-label">שעת סיום <span style="color:#ff6b6b;">*</span></label>
            <input type="time" id="manual-end" class="form-control" />
          </div>
          <div class="col-12">
            <label class="form-label">תיאור המשימה</label>
            <input type="text" id="manual-desc" class="form-control"
                   placeholder="למשל: ישיבת צוות, עבודה על פרויקט..." />
          </div>
          <div class="col-12">
            <div id="manual-duration-preview" class="mb-2" style="color:#878686;font-size:.88rem;"></div>
            <button class="btn btn-primary w-100 btn-xl" onclick="submitManual()">
              <i class="bi bi-check-lg me-1"></i> שמור דיווח
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: HISTORY ───────────────────────────────────────────────────────── -->
    <div class="tab-pane fade" id="tab-history">
      <div class="card p-0 overflow-hidden">
        <div class="card-header d-flex justify-content-between align-items-center py-3 px-4">
          <span class="history-header-title">
            <i class="bi bi-clock-history me-1"></i>30 הדיווחים האחרונים
          </span>
          <button class="btn btn-outline-primary btn-sm" onclick="loadMyLogs()">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>תאריך</th>
                <th>לקוח</th>
                <th>תיאור</th>
                <th>שעות</th>
              </tr>
            </thead>
            <tbody id="history-body">
              <tr><td colspan="4" class="text-center py-4" style="color:#595855;">טוען...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div><!-- end tab-content -->
</div><!-- end dashboard -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let timerInterval = null;
  let timerStartEpoch = null;

  // ── Init ────────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', async () => {
    await loadEmployees();
    const me = await fetch('/api/me').then(r => r.json());
    if (me.logged_in) {
      showDashboard(me.name, me.is_admin);
      await loadClients();
      await checkTimerStatus();
    }
    // Set today's date as default for manual form
    document.getElementById('manual-date').value = new Date().toISOString().split('T')[0];
    // Preview duration on time change
    ['manual-start','manual-end'].forEach(id =>
      document.getElementById(id).addEventListener('change', previewDuration));
    // Login on Enter
    document.getElementById('inp-pin').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  // ── Auth ────────────────────────────────────────────────────────────────────
  async function loadEmployees() {
    const emps = await fetch('/api/employees').then(r => r.json());
    const sel = document.getElementById('sel-employee');
    emps.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.id; opt.textContent = e.name;
      sel.appendChild(opt);
    });
  }

  async function doLogin() {
    const empId = document.getElementById('sel-employee').value;
    const pin = document.getElementById('inp-pin').value.trim();
    const errEl = document.getElementById('login-error');
    errEl.classList.add('d-none');
    if (!empId) { showLoginError('יש לבחור עובד'); return; }
    if (!pin) { showLoginError('יש להזין PIN'); return; }
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({employee_id: parseInt(empId), pin})
    });
    const data = await res.json();
    if (!res.ok) { showLoginError(data.error); return; }
    showDashboard(data.name, data.is_admin);
    await loadClients();
    await checkTimerStatus();
  }

  function showLoginError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg; el.classList.remove('d-none');
  }

  function showDashboard(name, isAdmin) {
    document.getElementById('section-login').classList.add('d-none');
    document.getElementById('section-dashboard').classList.remove('d-none');
    document.getElementById('dash-name').textContent = name;
    document.getElementById('nav-name').textContent = name;
    document.getElementById('nav-name').classList.remove('d-none');
    document.getElementById('btn-logout').classList.remove('d-none');
    if (isAdmin) document.getElementById('nav-admin-link').classList.remove('d-none');
    // Set date
    document.getElementById('dash-date').textContent = new Date().toLocaleDateString('he-IL', {
      weekday:'long', year:'numeric', month:'long', day:'numeric'
    });
  }

  async function logout() {
    await fetch('/api/logout', {method:'POST'});
    location.reload();
  }

  // ── Clients ─────────────────────────────────────────────────────────────────
  async function loadClients() {
    const clients = await fetch('/api/clients').then(r => r.json());
    ['timer-client','manual-client'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = '<option value="">-- בחר לקוח --</option>';
      clients.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.name;
        sel.appendChild(opt);
      });
    });
  }

  // ── Timer ───────────────────────────────────────────────────────────────────
  async function checkTimerStatus() {
    const data = await fetch('/api/timer/status').then(r => r.json());
    if (data.running) {
      timerStartEpoch = new Date(data.start_time).getTime();
      setTimerRunningUI(data.client_id, data.description, data.elapsed_seconds);
    }
  }

  function setTimerRunningUI(clientId, description, elapsedInit) {
    document.getElementById('btn-start').classList.add('d-none');
    document.getElementById('btn-stop').classList.remove('d-none');
    document.getElementById('timer-form').style.opacity = '0.4';
    document.getElementById('timer-form').style.pointerEvents = 'none';
    document.getElementById('timer-display').classList.add('running');
    document.getElementById('timer-status-text').textContent = 'מדידה פעילה...';
    const infoEl = document.getElementById('timer-running-info');
    infoEl.classList.remove('d-none');
    // Find client name from select
    const sel = document.getElementById('timer-client');
    const opt = sel.querySelector(`option[value="${clientId}"]`);
    document.getElementById('timer-client-name').textContent = opt ? opt.textContent : '';
    document.getElementById('timer-desc-text').textContent = description || '';
    // Start interval
    let elapsed = elapsedInit || 0;
    clearInterval(timerInterval);
    updateTimerDisplay(elapsed);
    timerInterval = setInterval(() => { elapsed++; updateTimerDisplay(elapsed); }, 1000);
  }

  function updateTimerDisplay(seconds) {
    const h = Math.floor(seconds / 3600).toString().padStart(2,'0');
    const m = Math.floor((seconds % 3600) / 60).toString().padStart(2,'0');
    const s = (seconds % 60).toString().padStart(2,'0');
    document.getElementById('timer-display').textContent = `${h}:${m}:${s}`;
  }

  async function startTimer() {
    const clientId = document.getElementById('timer-client').value;
    const desc = document.getElementById('timer-desc').value.trim();
    const alertEl = document.getElementById('timer-alert');
    alertEl.classList.add('d-none');
    if (!clientId) {
      alertEl.innerHTML = '<div class="alert alert-warning">יש לבחור לקוח</div>';
      alertEl.classList.remove('d-none'); return;
    }
    const res = await fetch('/api/timer/start', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({client_id: parseInt(clientId), description: desc})
    });
    const data = await res.json();
    if (!res.ok) {
      alertEl.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
      alertEl.classList.remove('d-none'); return;
    }
    timerStartEpoch = new Date(data.start_time).getTime();
    setTimerRunningUI(clientId, desc, 0);
  }

  async function stopTimer() {
    const res = await fetch('/api/timer/stop', {method:'POST'});
    const data = await res.json();
    clearInterval(timerInterval);
    timerInterval = null;
    document.getElementById('btn-start').classList.remove('d-none');
    document.getElementById('btn-stop').classList.add('d-none');
    document.getElementById('timer-form').style.opacity = '';
    document.getElementById('timer-form').style.pointerEvents = '';
    document.getElementById('timer-display').textContent = '00:00:00';
    document.getElementById('timer-display').classList.remove('running');
    document.getElementById('timer-status-text').textContent = 'לא פעיל';
    document.getElementById('timer-running-info').classList.add('d-none');
    if (res.ok) {
      const mins = data.duration_minutes;
      const alertEl = document.getElementById('timer-alert');
      alertEl.innerHTML = `<div class="alert alert-success">
        <i class="bi bi-check-circle me-1"></i>
        נשמר! סה"כ: <strong>${fmtMins(mins)}</strong>
      </div>`;
      alertEl.classList.remove('d-none');
      setTimeout(() => alertEl.classList.add('d-none'), 4000);
    }
  }

  // ── Manual ──────────────────────────────────────────────────────────────────
  function previewDuration() {
    const startVal = document.getElementById('manual-start').value;
    const endVal = document.getElementById('manual-end').value;
    const prev = document.getElementById('manual-duration-preview');
    if (startVal && endVal) {
      const today = document.getElementById('manual-date').value || '2000-01-01';
      const start = new Date(`${today}T${startVal}`);
      const end = new Date(`${today}T${endVal}`);
      const diff = (end - start) / 60000;
      if (diff > 0) {
        prev.textContent = `משך: ${fmtMins(diff)}`;
        prev.className = 'text-success small mb-1 fw-semibold';
      } else {
        prev.textContent = 'שעת הסיום חייבת להיות אחרי שעת ההתחלה';
        prev.className = 'text-danger small mb-1';
      }
    }
  }

  async function submitManual() {
    const date = document.getElementById('manual-date').value;
    const start = document.getElementById('manual-start').value;
    const end = document.getElementById('manual-end').value;
    const client = document.getElementById('manual-client').value;
    const desc = document.getElementById('manual-desc').value.trim();
    const alertEl = document.getElementById('manual-alert');
    alertEl.classList.add('d-none');

    const res = await fetch('/api/logs/manual', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({date, start_time: start, end_time: end, client_id: parseInt(client), description: desc})
    });
    const data = await res.json();
    if (!res.ok) {
      alertEl.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
      alertEl.classList.remove('d-none'); return;
    }
    alertEl.innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle me-1"></i>הדיווח נשמר בהצלחה!</div>';
    alertEl.classList.remove('d-none');
    ['manual-client','manual-start','manual-end','manual-desc'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('manual-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('manual-duration-preview').textContent = '';
    setTimeout(() => alertEl.classList.add('d-none'), 3000);
  }

  // ── History ─────────────────────────────────────────────────────────────────
  async function loadMyLogs() {
    const tbody = document.getElementById('history-body');
    tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4" style="color:#595855;">טוען...</td></tr>';
    const logs = await fetch('/api/my/logs').then(r => r.json());
    if (!logs.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4" style="color:#595855;">אין דיווחים עדיין</td></tr>';
      return;
    }
    tbody.innerHTML = logs.map(l => `
      <tr class="recent-log-row">
        <td><span class="text-nowrap" style="color:#d1ccbc;">${l.date}</span><br/><small style="color:#595855;">${l.start_time}–${l.end_time}</small></td>
        <td style="color:#d1ccbc;">${l.client}</td>
        <td><small style="color:#878686;">${l.description || '—'}</small></td>
        <td><span class="badge bg-primary log-badge">${fmtMins(l.duration_minutes)}</span></td>
      </tr>`).join('');
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function fmtMins(m) {
    if (!m) return '0 דק\'';
    const h = Math.floor(m / 60);
    const min = m % 60;
    if (h === 0) return `${min} דק'`;
    if (min === 0) return `${h} שע'`;
    return `${h}:${String(min).padStart(2,'00')} שע'`;
  }
</script>
</body>
</html>
